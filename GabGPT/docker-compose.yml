services:
  # Servicio de llama.cpp
  llamacpp:
    build:
      context: ./llama.cpp
      dockerfile: Dockerfile
    env_file:
      - .env.docker
      - .env.llama
      - .env.llm
    container_name: llamacpp
    restart: unless-stopped
    ports:
      - "8080:8080"  # Puerto interno de la API de llama.cpp
    #volumes:
    #  - ./llama.cpp/models:/app/models  # Monta los modelos locales
    #environment:
    #  - MODEL_PATH=/app/models/llama-2-7b.Q4_K_M.gguf  # Ajusta según tu modelo
    #command: ["--host", "0.0.0.0", "--port", "8080", "--model", "/app/models/llama-2-7b.Q4_K_M.gguf"]
    networks:
      - app_network

  # Servicio de Nginx (proxy inverso con autenticación por API-KEY)
  nginx:
    image: nginx:alpine
    build:
      context: ./nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"  # Opcional: si usas HTTPS
    depends_on:
      - llamacpp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd  # Opcional: para autenticación básica
    #environment:
    #  - API_KEY=tu_api_key_secreta  # Cambia esto por tu API-KEY
    networks:
      - app_network

  # Servicio de Open WebUI
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "8081:8080"  # Puerto interno de Open WebUI
    volumes:
      - ./open-webui/data:/app/backend/data  # Persistencia de datos
    environment:
      - OLLAMA_BASE_URL=http://nginx/api  # Apunta a Nginx como proxy
    depends_on:
      - nginx
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
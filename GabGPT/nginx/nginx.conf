worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Configuración para autenticación por API-KEY
    map $http_x_api_key $api_key_valid {
        default 0;
        "tu_api_key_secreta" 1;  # Cambia esto por tu API-KEY
    }

    server {
        listen 80;
        server_name localhost;

        # Bloquear peticiones sin API-KEY válida
        location /api/ {
            #if ($api_key_valid = 0) {
            #    return 403 "Forbidden: Invalid or missing API-KEY";
            #}

            proxy_pass http://llamacpp:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Redirigir el frontend de Open WebUI
        location / {
            proxy_pass http://openwebui:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
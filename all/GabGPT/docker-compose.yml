services:
  
  # Servicio de llama.cpp
  # ****************************************************************
  llamacpp:
    build:
      context: ./llama.cpp
      dockerfile: Dockerfile
      args:
        # Aquí mapeamos la variable del .env al argumento del Dockerfile
        - AMDGPU_TARGETS=${AMDGPU_TARGETS}
    # command: ["-shm-size 8g","--ipc=host"]    
    container_name: llama.cpp
    restart: unless-stopped
    environment:
      - LLAMA_ARG_PORT=${LLAMACPP_CONTAINER_PORT}
      - LLAMA_ARG_MODEL=${LLAMACPP_MODEL_2_RUN}
      - HSA_OVERRIDE_GFX_VERSION=${HSA_OVERRIDE_GFX_VERSION}
    env_file:
      - ${GABGPT_SECRET_FOLDER}/.env.llama
    devices:
      - "/dev/kfd:/dev/kfd"    # Interfaz de computación AMD
      - "/dev/dri:/dev/dri"    # Renderizado directo
        #    group_add:
        #- video                  # Permisos para acceder al hardware de video
        #- render
    ipc : host      # Optimizacion: Comparte el espacio de memoria interproceso con el host. El contenedor puede acceder a recursos del host como semaforos, memoria compartida...
    shm_size: 8g    # Optimizacion: Define el tamaño de la memoria compartida. Los procesos comparten memoria directamente en la memoria, sin tener que copiarlos.
    security_opt:
      - seccomp:unconfined     # A veces necesario para ROCm
    expose:
      - ${LLAMACPP_CONTAINER_PORT}  # Con Expose evitamos que haya un puerto hacia afuera del contenedor asi que solo se puden ver entre los del contenedor.
    volumes:
      - ${LLAMACPP_HOST_MODELS_FOLDER}:${LLAMACPP_CONTAINER_MODELS_FOLDER}  # Monta los modelos locales
    networks:
      - app_network


  # Servicio de Nginx (proxy inverso con autenticación por API-KEY)
  # ****************************************************************
  nginx:
    image: nginx:alpine
      #    build:
      #context: ./nginx
    container_name: nginx-landing
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_HTTP_PORT}:${NGINX_CONTAINER_HTTP_PORT}"
      - "${NGINX_HOST_HTTPS_PORT}:${NGINX_CONTAINER_HTTPS_PORT}"  # Opcional: si usas HTTPS
    depends_on:
      - openwebui
      - llamacpp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd  # Opcional: para autenticación básica
    #environment:
    #  - API_KEY=tu_api_key_secreta  # Cambia esto por tu API-KEY
    networks:
      - app_network

  # Servicio de OpenWebUI
  # ****************************************************************
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "${OPENWEBUI_HOST_PORT}:${OPENWEBUI_CONTAINER_PORT}"  # Puerto interno de Open WebUI
    depends_on: 
      - llamacpp
    env_files:
      - .${GABGPT_SECRET_FOLDER}/.env.openwebui
    volumes:
      - ${OPENWEBUI_DATA_PATH}:/app/backend/data  # Persistencia de datos
    environment:
      #- OLLAMA_BASE_URL=${LLM_SERVER_URL}  # Apunta a Nginx como proxy
      - OPENAI_API_BASE_URL=${LLAMACPP_SERVER_URL}  # Apunta a Nginx como proxy
      - OPENAI_API_KEY=api_key_openai
      - WEBUI_SECRET_KEY=misupersecretokey
    networks:
      - app_network

  # Servicio de OpenNotebook (NotebookLM open source)
  # ****************************************************************
  #opennotebook:
  

networks:
  app_network:
    driver: bridge

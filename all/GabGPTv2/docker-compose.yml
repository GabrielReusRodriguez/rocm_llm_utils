services:
  # Servicio de llama.cpp
  llamacpp:
    build:
      context: ./llama.cpp
      dockerfile: Dockerfile
    command: ["-shm-size 8g","--ipc=host"]
    env_file:
      - ./llama.cpp/.env.docker
      - ./llama.cpp/.env.llama
      - ./llama.cpp/.env.llm
    container_name: llamacpp
    restart: unless-stopped
    ports:
      - "${LLAMA_DOCKER_HOST_PORT}:${LLAMA_DOCKER_CONTAINER_PORT}"  # Puerto interno de la API de llama.cpp
    #volumes:
    #  - ./llama.cpp/models:/app/models  # Monta los modelos locales
    #environment:
    #  - MODEL_PATH=/app/models/llama-2-7b.Q4_K_M.gguf  # Ajusta según tu modelo
    #command: ["--host", "0.0.0.0", "--port", "8080", "--model", "/app/models/llama-2-7b.Q4_K_M.gguf"]  

  # Servicio de Nginx (proxy inverso con autenticación por API-KEY)
  nginx:
    image: nginx:alpine
    build:
      context: ./nginx
    container_name: nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HOST_HTTP_PORT}:${NGINX_CONTAINER_HTTP_PORT}"
      - "${NGINX_HOST_HTTPS_PORT}:${NGINX_CONTAINER_HTTPS_PORT}"  # Opcional: si usas HTTPS
    depends_on:
      - llamacpp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd  # Opcional: para autenticación básica
    #environment:
    #  - API_KEY=tu_api_key_secreta  # Cambia esto por tu API-KEY
    networks:
      - app_network

  # Servicio de Open WebUI
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "${OPENWEB_UI_HOST_PORT}:${OPENWEB_UI_CONTAINER_PORT}"  # Puerto interno de Open WebUI
    volumes:
      - ${OPENWEB_UI_DATA_PATH}/open-webui/data:/app/backend/data  # Persistencia de datos
    environment:
      - OLLAMA_BASE_URL=${LLM_SERVER_URL}  # Apunta a Nginx como proxy
    networks:
      - app_network

networks:
  app_network:
    driver: bridge
